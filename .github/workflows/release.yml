name: Release Artifacts

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Zip extension
        run: |
          cd dist
          zip -r ../title-capture-v${GITHUB_REF_NAME#v}.zip .

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: title-capture-v${GITHUB_REF_NAME#v}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
