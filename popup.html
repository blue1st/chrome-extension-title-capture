<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Title Capture Pro</title>
    <link rel="stylesheet" href="./src/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Title Capture Pro</h1>
        <p class="description">Captured current tab info</p>
      </header>
      
      <div class="output-container">
        <textarea id="output" readonly></textarea>
        <div id="toast" class="toast">Copied!</div>
      </div>

      <button id="copy-btn" class="btn-primary">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
        Copy to Clipboard
      </button>

      <footer class="footer">
        <span class="version">v1.0.0</span>
        <button id="options-btn" class="btn-secondary">Settings</button>
      </footer>
    </div>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
